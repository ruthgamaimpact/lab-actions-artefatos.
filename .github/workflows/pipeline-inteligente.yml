name: Pipeline Inteligente

on:
  workflow_dispatch:

  schedule:
    - cron: '0 2 * * *'

  push:
    branches:
      - 'feature/**'
    paths:
      - 'src/**'
      - '!src/docs/**'

jobs:
  job_gerador:
    runs-on: ubuntu-latest

    steps:
      - name: Criar arquivos de build
        run: |
          mkdir -p saida_build
          echo "Relatório 1 gerado com sucesso" > saida_build/relatorio1.txt
          echo "Relatório 2 gerado com sucesso" > saida_build/relatorio2.txt
          ls -R 

      - name: Upload de artefatos
        uses: actions/upload-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: ./saida_build   # 🔥 caminho explícito

  job_auditoria:
    runs-on: ubuntu-latest
    needs: job_gerador

    steps:
      - name: Download de artefatos
        uses: actions/download-artifact@v4
        with:
          name: meus-relatorios-oficiais

      - name: Listar estrutura
        run: ls -R
        
        - name: Exibir conteúdo do relatório
        run: cat relatorio1.txt
